name: Generate Snake

on:
  schedule:
    # every day at midnight
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Generates the snake
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: TheJenilDGohel
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?color_snake=magenta&color_dots=#0d1117,#161b22,#730073,#b300b3,#ff00ff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push the SVG to the output branch
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
